<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Cadastro</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="login">

<h2>Criar conta</h2>

<form>

<label for="nome">Nome</label>
<input id="nome" type="text" placeholder="Digite seu nome" required>

<label for="email">Email</label>
<input id="email" type="email" placeholder="Digite seu email" required>

<label for="senha">Senha</label>
<input id="senha" type="password" placeholder="Crie uma senha" required>

<label for="confirmar">Confirmar senha</label>
<input id="confirmar" type="password" placeholder="Confirme sua senha" required>

<button>Cadastrar</button>

<p>Já tem conta? <a href="index.html">Fazer login</a></p>

</form>

</div>

</body>
</html>
